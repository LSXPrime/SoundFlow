name: 'YDMS-specific build pipeline'

on:
  push:
  workflow_dispatch:
  pull_request:
  release:
    types:
      - published

jobs:
  build-ffmpeg:
    uses: ./.github/workflows/build-ffmpeg.yml@master

  build-solution:
    name: 'Build solution and publish'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - 'Src/SoundFlow.csproj'
          - 'Midi/SoundFlow.Midi.PortMidi/SoundFlow.Midi.PortMidi.csproj'
          - 'Extensions/SoundFlow.Extensions.WebRtc.Apm/SoundFlow.Extensions.WebRtc.Apm.csproj'
          - 'Codecs/SoundFlow.Codecs.FFMpeg/SoundFlow.Codecs.FFMpeg.csproj'

    env:
      IS_RELEASE: ${{ github.event_name == 'release' && github.event.action == 'published' }}

    needs:
      - build-ffmpeg

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Build NuGet'
        uses: Yellow-Dog-Man/composite-actions-templates/.github/actions/dotnet-build@9ecab12bbf1b40d14409bbaa13cb4f2ddb1ceb60 # main
        with:
          dotnet-build-args: ${{ env.IS_RELEASE == 'true' && format('-p:Version={0} -o nupkgs', github.ref_name) || '-o nupkgs' }}
          dotnet-project-path: '${{ matrix.project }}'
          dotnet-build-type: 'pack'

      - name: 'Download ffmpeg libs'
        if: ${{ contains(matrix.project, 'SoundFlow.Codecs.FFMpeg.csproj') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: needs.build-ffmpeg.outputs.packageid

      - name: 'Update ffmpeg libs'
        if: ${{ contains(matrix.project, 'SoundFlow.Codecs.FFMpeg.csproj') }}
        run: |
          unzip soundflow-ffmpeg-runtimes.zip
          rm -rf "${{ github.workspace }}/Codecs/SoundFlow.Codecs.FFMpeg/runtimes"
          mv runtimes "${{ github.workspace }}/Codecs/SoundFlow.Codecs.FFMpeg/"

      - name: 'Artifact naming'
        id: naming
        run: |
          project="${{ matrix.project }}"
          name="${project//\//-}-${{ github.sha }}"
          echo "artifactname=$name" >> "$GITHUB_OUTPUT"

      - name: 'Upload artifacts'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: 'nupkgs/*'
          name: ${{ steps.naming.outputs.artifactname }}

      - name: 'Push NuGet'
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: Yellow-Dog-Man/composite-actions-templates/.github/actions/dotnet-build-push-nuget@9ecab12bbf1b40d14409bbaa13cb4f2ddb1ceb60 # main
        with:
          dotnet-nuget-auth-token: ${{ secrets.NUGET_TOKEN }}
